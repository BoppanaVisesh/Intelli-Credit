version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: intellicredit-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: intellicredit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intellicredit123}
      POSTGRES_DB: intellicredit
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - intellicredit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellicredit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellicredit-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
    environment:
      - DATABASE_URL=postgresql://intellicredit:${POSTGRES_PASSWORD:-intellicredit123}@db:5432/intellicredit
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - intellicredit-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intellicredit-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    command: npm run dev -- --host 0.0.0.0
    networks:
      - intellicredit-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: intellicredit-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - intellicredit-network
    depends_on:
      - backend
      - frontend

networks:
  intellicredit-network:
    driver: bridge

volumes:
  pgdata:
  uploads:
  downloads:
